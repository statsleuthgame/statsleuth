<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>StatSleuth ⚾ MLB</title>
  <link rel="stylesheet" href="shared.css" />
  <style>
    :root {
      --accent: #c0392b;
      --accent-light: #fdeaea;
      --accent-glow: rgba(192,57,43,0.12);
    }

    /* Baseball stitching texture */
    .card-header {
      background: linear-gradient(135deg, #c0392b 0%, #96281b 100%);
    }

    .card-header::before {
      content: '';
      position: absolute;
      inset: 0;
      background-image:
        radial-gradient(circle at 30% 50%, rgba(255,255,255,0.06) 0%, transparent 60%),
        radial-gradient(circle at 70% 50%, rgba(255,255,255,0.06) 0%, transparent 60%);
      background-size: 60px 60px;
    }

    /* Stitching lines */
    .card-header::after {
      content: '';
      position: absolute;
      inset: 0;
      background-image:
        repeating-linear-gradient(
          90deg,
          transparent,
          transparent 8px,
          rgba(255,255,255,0.07) 8px,
          rgba(255,255,255,0.07) 9px
        ),
        repeating-linear-gradient(
          0deg,
          transparent,
          transparent 8px,
          rgba(255,255,255,0.04) 8px,
          rgba(255,255,255,0.04) 9px
        );
    }

    .sport-badge {
      position: absolute;
      top: 10px;
      left: 14px;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 11px;
      letter-spacing: 2px;
      color: rgba(255,255,255,0.6);
      z-index: 4;
    }

    .stat-sleuth-badge {
      position: absolute;
      top: 10px;
      right: 14px;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 11px;
      letter-spacing: 2px;
      color: rgba(255,255,255,0.6);
      z-index: 4;
    }
  </style>
</head>
<body>

<nav>
  <a class="nav-logo" href="mlb.html">🔍 <span>STAT</span>SLEUTH</a>
  <ul class="nav-links">
    <li><a href="mlb.html" class="active">⚾ MLB</a></li>
    <li><a href="nba.html">🏀 NBA</a></li>
    <li><a href="nfl.html">🏈 NFL</a></li>
  </ul>
  <div class="nav-spacer"></div>
  <div class="nav-date" id="nav-date"></div>
</nav>

<main>

  <div class="page-header">
    <h1>⚾ <span>MLB</span> DAILY</h1>
    <p class="eligibility-note">Players must have a minimum of 100 PA in the clue year to be eligible</p>
  </div>

  <!-- THE CARD -->
  <div class="card-wrapper">
    <div class="sports-card" id="sports-card">

      <div class="card-header" id="card-header">
        <span class="sport-badge">MLB</span>
        <span class="stat-sleuth-badge">STATSLEUTH</span>
        <div class="mystery-icon">⚾</div>
        <div class="player-name-reveal" id="player-name-reveal"></div>
      </div>

      <!-- Clue Row 1 -->
      <div class="clue-row" id="clue-0">
        <div class="clue-row-locked">
          <div class="lock-dots"><span></span><span></span><span></span></div>
        </div>
        <div class="clue-row-inner">
          <div class="clue-number">1</div>
          <div class="clue-content">
            <div class="clue-label">Year</div>
            <div class="clue-value" id="clue-val-0"></div>
          </div>
        </div>
      </div>

      <!-- Clue Row 2 -->
      <div class="clue-row" id="clue-1">
        <div class="clue-row-locked">
          <div class="lock-dots"><span></span><span></span><span></span></div>
        </div>
        <div class="clue-row-inner">
          <div class="clue-number">2</div>
          <div class="clue-content">
            <div class="clue-label">Batting Average</div>
            <div class="clue-value" id="clue-val-1"></div>
          </div>
        </div>
      </div>

      <!-- Clue Row 3 -->
      <div class="clue-row" id="clue-2">
        <div class="clue-row-locked">
          <div class="lock-dots"><span></span><span></span><span></span></div>
        </div>
        <div class="clue-row-inner">
          <div class="clue-number">3</div>
          <div class="clue-content">
            <div class="clue-label">Position / Throws</div>
            <div class="clue-value" id="clue-val-2"></div>
          </div>
        </div>
      </div>

      <!-- Clue Row 4 -->
      <div class="clue-row" id="clue-3">
        <div class="clue-row-locked">
          <div class="lock-dots"><span></span><span></span><span></span></div>
        </div>
        <div class="clue-row-inner">
          <div class="clue-number">4</div>
          <div class="clue-content">
            <div class="clue-label">League</div>
            <div class="clue-value" id="clue-val-3"></div>
          </div>
        </div>
      </div>

      <!-- Clue Row 5 -->
      <div class="clue-row" id="clue-4">
        <div class="clue-row-locked">
          <div class="lock-dots"><span></span><span></span><span></span></div>
        </div>
        <div class="clue-row-inner">
          <div class="clue-number">5</div>
          <div class="clue-content">
            <div class="clue-label">Team</div>
            <div class="clue-value" id="clue-val-4"></div>
          </div>
        </div>
      </div>

    </div>
  </div>

  <!-- GUESS AREA -->
  <div class="guess-area" id="guess-area">
    <div class="guess-count">
      <div class="guess-pip" id="pip-0"></div>
      <div class="guess-pip" id="pip-1"></div>
      <div class="guess-pip" id="pip-2"></div>
      <div class="guess-pip" id="pip-3"></div>
      <div class="guess-pip" id="pip-4"></div>
    </div>
    <div class="search-container">
      <input
        type="text"
        class="search-input"
        id="search-input"
        placeholder="Search for a player..."
        autocomplete="off"
        spellcheck="false"
      />
      <div class="autocomplete-dropdown" id="autocomplete-dropdown"></div>
    </div>
    <button class="guess-btn" id="guess-btn">Submit Guess</button>
  </div>

  <!-- WRONG GUESSES -->
  <div class="wrong-guesses" id="wrong-guesses" style="display:none;">
    <div class="wrong-guesses-title">Previous Guesses</div>
    <div id="wrong-guesses-list"></div>
  </div>

  <!-- LOCKED BANNER -->
  <div class="locked-banner" id="locked-banner">
    🔒 Come back tomorrow for a new player!
  </div>

  <!-- END STATE -->
  <div class="end-state" id="end-state">
    <div class="end-state-score" id="end-score"></div>
    <div class="end-state-sub" id="end-sub"></div>
    <div class="emoji-grid" id="emoji-grid"></div>
    <button class="share-btn" id="share-btn">🔗 Share Result</button>
    <div class="come-back">New player tomorrow at midnight</div>
  </div>

</main>

<script src="config.js"></script>
<script src="game.js"></script>
<script>
  // Set nav date
  document.getElementById('nav-date').textContent =
    new Date().toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' });

  // Populate clue values from config
  const cfg = STATSLEUTH_CONFIG.mlb;
  cfg.clues.forEach((clue, i) => {
    const el = document.getElementById(`clue-val-${i}`);
    if (el) el.textContent = clue.value;
  });

  // Init game
  initGame('mlb', cfg);
</script>
</body>
</html>
